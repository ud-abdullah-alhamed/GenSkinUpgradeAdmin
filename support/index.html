<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen Skin - Support</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root {
    --brand-red: #FF4B4B;
    --brand-blue: #3B82F6;

    --white: #FFFFFF;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-300: #D1D5DB;
    --gray-400: #9CA3AF;
    --gray-500: #6B7280;
    --gray-600: #4B5563;
    --gray-700: #374151;
    --gray-800: #1F2937;
    --gray-900: #111827;

    --status-success: #10B981;
    --status-warning: #F59E0B;
    --status-danger: #EF4444;
    --status-info: #3B82F6;

    --sidebar-width: 260px;
    --header-height: 80px;

    --font-family: 'Inter', sans-serif;
    --text-xs: 0.75rem;
    --text-sm: 0.875rem;
    --text-base: 1rem;
    --text-lg: 1.125rem;
    --text-xl: 1.25rem;
    --text-2xl: 1.5rem;

    --space-1: 0.25rem;
    --space-2: 0.5rem;
    --space-3: 0.75rem;
    --space-4: 1rem;
    --space-6: 1.5rem;
    --space-8: 2rem;

    --radius-sm: 0.375rem;
    --radius-md: 0.5rem;
    --radius-lg: 0.75rem;

    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: var(--font-family);
    background-color: var(--gray-50);
    color: var(--gray-900);
    font-size: var(--text-sm);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
}


.app-container {
    display: flex;
    min-height: 100vh;
}

.main-content {
    flex: 1;
    margin-left: var(--sidebar-width);
    width: calc(100% - var(--sidebar-width));
    min-height: 100vh;
}

body.auth-mode .sidebar {
    display: none;
}

body.auth-mode .main-content {
    margin-left: 0;
    width: 100%;
}


.sidebar {
    width: var(--sidebar-width);
    background: var(--white);
    border-right: 1px solid var(--gray-200);
    position: fixed;
    left: 0;
    top: 0;
    height: 100vh;
    z-index: 50;
    display: flex;
    flex-direction: column;
}

.logo {
    height: var(--header-height);
    display: flex;
    align-items: center;
    padding: 0 var(--space-6);
    gap: var(--space-3);
    border-bottom: 1px solid var(--gray-100);
}

.logo-icon {
    width: 32px;
    height: 32px;
    color: var(--brand-red);
}

.logo-text {
    font-size: var(--text-xl);
    font-weight: 700;
    color: var(--brand-red);
}

.nav-menu {
    flex: 1;
    padding: var(--space-6) var(--space-4);
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
}

.nav-item {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-3) var(--space-4);
    border-radius: var(--radius-md);
    color: var(--gray-600);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
}

.nav-item svg {
    width: 20px;
    height: 20px;
}

.nav-item:hover {
    background-color: var(--gray-50);
    color: var(--gray-900);
}

.nav-item.active {
    background-color: #EFF6FF;
    color: var(--brand-blue);
}

.nav-footer {
    padding: var(--space-6) var(--space-4);
    border-top: 1px solid var(--gray-100);
}

.content-header {
    height: var(--header-height);
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 var(--space-8);
    border-bottom: 1px solid var(--gray-200);
}

.user-profile {
    display: flex;
    align-items: center;
    gap: var(--space-3);
}

.user-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background-color: #EFF6FF;
    color: var(--brand-blue);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: var(--text-sm);
}

.user-info {
    text-align: right;
}

.user-name {
    font-weight: 600;
    color: var(--gray-900);
    font-size: var(--text-sm);
}

.user-role {
    font-size: var(--text-xs);
    color: var(--gray-500);
}

.content-body {
    padding: var(--space-8);
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
}

.page-title {
    font-size: var(--text-2xl);
    font-weight: 700;
    color: var(--gray-900);
    margin-bottom: var(--space-2);
}

.page-subtitle {
    color: var(--gray-500);
    margin-bottom: var(--space-8);
}

.auth-page {
    display: none;
    background: var(--white);
}

.auth-page.active {
    display: flex;
}

.auth-container {
    display: flex;
    width: 100%;
    min-height: 100vh;
}

.auth-left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: var(--space-8);
    max-width: 500px;
    margin: 0 auto;
}

.auth-right {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--gray-50);
    padding: var(--space-8);
}

.auth-right img {
    max-width: 80%;
    height: auto;
}

.auth-logo {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    margin-bottom: var(--space-8);
}

.auth-logo svg {
    width: 40px;
    height: 40px;
    color: var(--brand-red);
}

.auth-logo span {
    font-size: var(--text-2xl);
    font-weight: 700;
    color: var(--brand-red);
}

.auth-title {
    font-size: var(--text-2xl);
    font-weight: 700;
    color: var(--gray-900);
    margin-bottom: var(--space-2);
}

.auth-subtitle {
    color: var(--gray-500);
    margin-bottom: var(--space-6);
}

.auth-badge {
    display: inline-block;
    padding: var(--space-2) var(--space-4);
    background: var(--gray-900);
    color: var(--white);
    border-radius: var(--radius-md);
    font-size: var(--text-xs);
    font-weight: 500;
    margin-bottom: var(--space-6);
}

.auth-form {
    margin-bottom: var(--space-6);
}

.auth-footer {
    text-align: center;
    color: var(--gray-500);
    font-size: var(--text-sm);
}

.form-group {
    margin-bottom: var(--space-4);
}

.form-label {
    display: block;
    font-weight: 500;
    color: var(--gray-700);
    margin-bottom: var(--space-2);
    font-size: var(--text-sm);
}

.form-input,
.form-select {
    width: 100%;
    padding: var(--space-3);
    border: 1px solid var(--gray-300);
    border-radius: var(--radius-md);
    font-size: var(--text-sm);
    font-family: inherit;
    transition: border-color 0.2s;
}

.form-input:focus,
.form-select:focus {
    outline: none;
    border-color: var(--brand-blue);
}

.form-link {
    color: var(--brand-red);
    cursor: pointer;
    font-size: var(--text-sm);
}

.form-link:hover {
    text-decoration: underline;
}

.checkbox-label {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    font-size: var(--text-sm);
    color: var(--gray-700);
    cursor: pointer;
}

.form-actions {
    display: flex;
    gap: var(--space-3);
    margin-top: var(--space-6);
}

.btn {
    padding: var(--space-3) var(--space-6);
    border-radius: var(--radius-md);
    font-weight: 500;
    font-size: var(--text-sm);
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    font-family: inherit;
}

.btn-primary {
    background: var(--gray-900);
    color: var(--white);
}

.btn-primary:hover {
    background: var(--gray-800);
}

.btn-outline {
    background: transparent;
    border: 1px solid var(--gray-300);
    color: var(--gray-700);
}

.btn-outline:hover {
    background: var(--gray-50);
}

/* Enhanced styles to match Figma design */

.table-card{ background:var(--white); border-radius:var(--radius-lg); padding:0; box-shadow:var(--shadow-sm); border:1px solid var(--gray-100); }
.table-header{ display:flex; align-items:center; justify-content:space-between; padding:var(--space-4) var(--space-6); border-bottom:1px solid var(--gray-100); }
.table-title{ font-weight:700; color:var(--gray-800) }
.table-actions{ display:flex; gap:0.5rem; align-items:center }
.table-wrapper{ padding:var(--space-4) var(--space-6); }
table{ width:100%; border-collapse:collapse; font-size:var(--text-sm) }
table thead th{ text-align:left; padding:12px 8px; font-size:var(--text-xs); color:var(--gray-500); font-weight:600; border-bottom:1px solid var(--gray-100); }
table tbody td{ padding:12px 8px; border-bottom:1px solid var(--gray-100); color:var(--gray-700) }

.action-bar{ display:flex; align-items:center; gap:12px }

/* Modal tweaks */
.modal{ display:none; position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); background:var(--white); padding:20px; border-radius:12px; z-index:1000; width:520px; box-shadow:var(--shadow-lg); }
.modal-overlay{ display:none; position:fixed; inset:0; background:rgba(2,6,23,0.6); z-index:900 }

/* Pagination */
.pagination{ display:flex; align-items:center; gap:8px; padding:8px 12px }
.pagination .btn{ padding:6px 10px }

/* Toast container already added dynamically; small smoothing */
#toast-container .toast{ transition: opacity 0.3s ease }

/* Responsive */
@media (max-width: 980px){
  .stats-grid{ grid-template-columns: repeat(2, 1fr) }
  .sidebar{ width: 72px }
  .main-content{ margin-left:72px; width: calc(100% - 72px) }
}

@media (max-width: 640px) {
  .stats-grid{ grid-template-columns: 1fr }
}


.btn-block {
    width: 100%;
}

.btn-sm {
    padding: var(--space-2) var(--space-4);
    font-size: var(--text-xs);
}

/* Stats Grid - Match Figma Design */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--space-6);
    margin-bottom: var(--space-8);
}

.stats-card {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg);
    padding: var(--space-6);
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
}

.stats-card .stats-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: var(--space-2);
}

.stats-card .stats-title {
    font-size: var(--text-sm);
    color: var(--gray-500);
    font-weight: 500;
    margin: 0;
}

.stats-card .stats-value {
    font-size: var(--text-2xl);
    font-weight: 700;
    color: var(--gray-900);
    margin: var(--space-2) 0;
    line-height: 1.2;
}

.stats-card .stats-change {
    font-size: var(--text-xs);
    color: var(--gray-500);
    margin-top: var(--space-1);
}

/* Dashboard stats cards with icons */
.stats-card .stats-icon {
    width: 48px;
    height: 48px;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--text-xl);
    flex-shrink: 0;
}

.stats-card .stats-info {
    flex: 1;
}

.stats-card .stats-info h3 {
    font-size: var(--text-sm);
    color: var(--gray-600);
    font-weight: 600;
    margin: 0 0 var(--space-1) 0;
}

.stats-card .stats-info .stats-value {
    font-size: var(--text-2xl);
    font-weight: 700;
    color: var(--gray-900);
    margin: var(--space-1) 0;
}

.stats-card .stats-info .stats-meta {
    font-size: var(--text-xs);
    color: var(--gray-500);
    margin: 0;
}

.table-card {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg);
    overflow: hidden;
}

.table-header {
    padding: var(--space-6);
    border-bottom: 1px solid var(--gray-200);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.table-title {
    font-weight: 600;
    color: var(--gray-900);
}

.table-actions {
    display: flex;
    gap: var(--space-3);
    align-items: center;
}

.table-wrapper {
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
}

thead {
    background: var(--gray-50);
}

th {
    padding: var(--space-4) var(--space-6);
    text-align: left;
    font-size: var(--text-xs);
    font-weight: 600;
    color: var(--gray-500);
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

td {
    padding: var(--space-4) var(--space-6);
    border-top: 1px solid var(--gray-200);
    color: var(--gray-700);
}

.table-footer {
    padding: var(--space-4) var(--space-6);
    border-top: 1px solid var(--gray-200);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: var(--text-sm);
    color: var(--gray-500);
}

.pagination {
    display: flex;
    gap: var(--space-2);
}

.badge {
    padding: var(--space-1) var(--space-3);
    border-radius: var(--radius-sm);
    font-size: var(--text-xs);
    font-weight: 500;
}

.badge-success {
    background: #ECFDF5;
    color: var(--status-success);
}

.badge-warning {
    background: #FFFBEB;
    color: var(--status-warning);
}

.badge-danger {
    background: #FEF2F2;
    color: var(--status-danger);
}

.badge-info {
    background: #EFF6FF;
    color: var(--status-info);
}

.badge-gray {
    background: var(--gray-100);
    color: var(--gray-600);
}

.settings-container {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg);
    overflow: hidden;
}

.settings-tabs {
    display: flex;
    border-bottom: 1px solid var(--gray-200);
    padding: 0 var(--space-6);
}

.settings-tab {
    padding: var(--space-4) var(--space-2);
    margin-right: var(--space-6);
    cursor: pointer;
    color: var(--gray-500);
    font-weight: 500;
    font-size: var(--text-sm);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
}

.settings-tab.active {
    color: var(--brand-blue);
    border-bottom-color: var(--brand-blue);
}

.settings-tab-content {
    display: none;
    padding: var(--space-6);
}

.settings-tab-content.active {
    display: block;
}

.settings-tab-content h3 {
    font-size: var(--text-base);
    font-weight: 600;
    margin-bottom: var(--space-6);
}

.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 100;
    display: none;
}

.modal-overlay.active {
    display: block;
}

.modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--white);
    border-radius: var(--radius-lg);
    padding: var(--space-6);
    width: 90%;
    max-width: 500px;
    z-index: 101;
    display: none;
}

.modal.active {
    display: block;
}

.modal h3 {
    font-size: var(--text-lg);
    font-weight: 600;
    margin-bottom: var(--space-6);
}

.view {
    display: none;
}

.view.active {
    display: block;
}

.customer-cell {
    display: flex;
    align-items: center;
    gap: var(--space-3);
}

.customer-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #EFF6FF;
    color: var(--brand-blue);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: var(--text-sm);
}

.customer-info {
    display: flex;
    flex-direction: column;
}

.customer-name {
    font-weight: 500;
    color: var(--gray-900);
}

.customer-id {
    font-size: var(--text-xs);
    color: var(--gray-500);
}

.spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    border-top-color: white;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 255, 0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
}

.action-menu {
    position: relative;
}

.action-btn {
    background: none;
    border: none;
    padding: 4px;
    cursor: pointer;
    color: var(--gray-400);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-sm);
    transition: all 0.2s;
}

.action-btn:hover {
    background: var(--gray-100);
    color: var(--gray-700);
}

.dropdown-menu {
    position: absolute;
    right: 0;
    top: 100%;
    margin-top: 4px;
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-lg);
    min-width: 160px;
    z-index: 100;
    display: none;
    overflow: hidden;
}

.dropdown-menu.show {
    display: block;
}

.dropdown-item {
    padding: var(--space-3) var(--space-4);
    cursor: pointer;
    font-size: var(--text-sm);
    color: var(--gray-700);
    transition: background 0.2s;
}

.dropdown-item:hover {
    background: var(--gray-50);
}

.dropdown-item.danger {
    color: var(--status-danger);
}

.dropdown-item.danger:hover {
    background: #FEF2F2;
}

.toggle-switch {
    position: relative;
    display: inline-block;
    width: 44px;
    height: 24px;
}

.toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.toggle-slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: var(--gray-300);
    transition: 0.3s;
    border-radius: 24px;
}

.toggle-slider:before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    left: 3px;
    bottom: 3px;
    background-color: var(--white);
    transition: 0.3s;
    border-radius: 50%;
}

.toggle-switch input:checked + .toggle-slider {
    background-color: var(--brand-blue);
}

.toggle-switch input:checked + .toggle-slider:before {
    transform: translateX(20px);
}

.settings-option {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--space-4) 0;
    border-bottom: 1px solid var(--gray-200);
}

.settings-option:last-child {
    border-bottom: none;
}

.settings-option-title {
    font-weight: 500;
    color: var(--gray-900);
    margin-bottom: var(--space-1);
}

.settings-option-description {
    font-size: var(--text-sm);
    color: var(--gray-500);
}

.chart-card {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg);
    padding: var(--space-6);
    box-shadow: var(--shadow-sm);
}

.chart-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: var(--space-6);
}

.chart-title {
    font-weight: 600;
    color: var(--gray-900);
    font-size: var(--text-base);
    margin-bottom: var(--space-1);
}

.chart-subtitle {
    font-size: var(--text-sm);
    color: var(--gray-500);
}

.chart-container {
    position: relative;
    height: 300px;
    width: 100%;
}

.grid {
    display: grid;
    gap: var(--space-6);
}

.grid-cols-2 {
    grid-template-columns: repeat(2, 1fr);
}

@media (max-width: 1200px) {
    .grid-cols-2 {
        grid-template-columns: 1fr;
    }
}

.mb-xl {
    margin-bottom: var(--space-8);
}

.stats-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: var(--space-2);
}

.stats-title {
    font-size: var(--text-sm);
    color: var(--gray-500);
    font-weight: 500;
    margin: 0;
}

.stats-change {
    font-size: var(--text-xs);
    color: var(--gray-500);
    margin-top: var(--space-1);
}

.modal {
    max-height: 90vh;
    overflow-y: auto;
}

.modal form {
    max-width: 100%;
}

textarea.form-input {
    resize: vertical;
    min-height: 80px;
}

/* Enhanced Responsive Design */
@media (max-width: 1200px) {
    .stats-grid {
        grid-template-columns: repeat(2, 1fr);
    }
    
    .grid-cols-2 {
        grid-template-columns: 1fr;
    }
    
    .table-actions {
        flex-wrap: wrap;
        gap: var(--space-2);
    }
}

    .sidebar.mobile-open {

    }
    
    .chart-card {

    }
    
    .chart-container {

    }
    
    .table-wrapper {

    table {

    .table-header {

/* Mobile menu toggle button */
.mobile-menu-toggle {
    display: none;
    position: fixed;
    top: var(--space-4);
    left: var(--space-4);
    z-index: 100;
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-md);
    padding: var(--space-2);
    cursor: pointer;
    box-shadow: var(--shadow-md);
}

@media (max-width: 768px) {
    .mobile-menu-toggle {
        display: block;
    }
}

/* Enhanced animations and transitions */
.stats-card,
.chart-card,
.table-card {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.stats-card:hover,
.chart-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
}

.btn {
    transition: all 0.2s ease;
}

.btn:active {
    transform: scale(0.98);
}

/* Loading states */
.loading {
    opacity: 0.6;
    pointer-events: none;
    position: relative;
}

.loading::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 20px;
    height: 20px;
    margin: -10px 0 0 -10px;
    border: 2px solid var(--gray-300);
    border-top-color: var(--brand-blue);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Enhanced focus states for accessibility */
.form-input:focus,
.form-select:focus,
.btn:focus {
    outline: 2px solid var(--brand-blue);
    outline-offset: 2px;
}

/* Print styles */
@media print {
    .sidebar,
    .content-header,
    .table-actions,
    .action-bar,
    .btn {
        display: none !important;
    }
    
    .main-content {
        margin-left: 0;
        width: 100%;
    }
    
    .table-card {
        box-shadow: none;
        border: 1px solid #000;
    }
}

/* Page Specific Overrides */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--gray-50);
        }

        .support-container {
            width: 100%;
            max-width: 500px;
            background: var(--white);
            padding: var(--space-8);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            margin: var(--space-4);
        }

        .form-textarea {
            width: 100%;
            padding: var(--space-3);
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-md);
            font-size: var(--text-sm);
            font-family: inherit;
            transition: border-color 0.2s;
            resize: vertical;
            min-height: 120px;
        }

        .form-textarea:focus {
            outline: none;
            border-color: var(--brand-blue);
        }

        .notification {
            padding: var(--space-3) var(--space-4);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-6);
            font-size: var(--text-sm);
            display: none;
        }

        .notification.success {
            background: #ecfdf5;
            color: var(--status-success);
            border: 1px solid #a7f3d0;
        }

        .notification.error {
            background: #fef2f2;
            color: var(--status-danger);
            border: 1px solid #fecaca;
        }

        /* Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-submit {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }
        
        .logo-center {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-3);
            margin-bottom: var(--space-6);
        }
        
        .logo-center svg {
            width: 32px;
            height: 32px;
            color: var(--brand-red);
        }
        
        .logo-center span {
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--brand-red);

</head>
<body>

    <div class="support-container">
        <div class="logo-center">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span>Genskin</span>
        </div>

        <h1 class="auth-title" style="text-align: center;">Support Center</h1>
        <p class="auth-subtitle" style="text-align: center;">We're here to help you with your skincare journey ✨</p>

        <div id="notification" class="notification"></div>

        <form id="supportForm">
            <div class="form-group">
                <label class="form-label" for="emailAndPhone">Email or Phone Number</label>
                <input type="text" id="emailAndPhone" class="form-input" placeholder="e.g., user@example.com or 962..." required>
            </div>

            <div class="form-group">
                <label class="form-label" for="title">Title</label>
                <input type="text" id="title" class="form-input" placeholder="What's this about?" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="description">Description</label>
                <textarea id="description" class="form-textarea" placeholder="Tell us more details..." required></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-submit" id="submitBtn">
                <div class="spinner" id="spinner"></div>
                <span id="btnText">Submit Request</span>
            </button>
        </form>

        <div class="footer">
            &copy; 2025 Gen Skin • Caring for your skin
        </div>
    </div>

    <script>
        document.getElementById('supportForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btnText');
            const notification = document.getElementById('notification');
            
            // UI Loading State
            submitBtn.disabled = true;
            spinner.style.display = 'block';
            btnText.textContent = 'Sending...';
            notification.style.display = 'none';

            const data = {
                emailAndPhone: document.getElementById('emailAndPhone').value,
                title: document.getElementById('title').value,
                description: document.getElementById('description').value
            };

            try {
                const response = await fetch('/api/SupportService', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    showNotification('success', 'Support request sent successfully!');
                    document.getElementById('supportForm').reset();
                } else {
                    const text = await response.text();
                    console.log('API Error Status:', response.status);
                    console.log('API Error Body:', text);

                    let msg = 'Failed to send request.';
                    let isUserRelatedError = false;

                    try {
                         const json = JSON.parse(text);
                         if(json.message) msg = json.message;
                         if(json.error) msg = json.error;
                         if(json.title) msg = json.title; 
                    } catch(e) {
                        if(text && text.length < 200) msg = text; 
                    }
                    
                    const lowerMsg = msg.toLowerCase();
                    const lowerText = text.toLowerCase();
                   
                    if (lowerMsg.includes('user') || lowerMsg.includes('exist') || lowerMsg.includes('found') ||
                        lowerText.includes('user') || lowerText.includes('exist') || lowerText.includes('found')) {
                        isUserRelatedError = true;
                    }
                    
                    if (response.status === 404 || response.status === 400) {
                        if (isUserRelatedError || msg === 'Failed to send request.' || msg === 'One or more validation errors occurred.') {
                             msg = 'User does not exist';
                        }
                    }

                    throw new Error(msg);
                }

            } catch (error) {
                console.error('Error:', error);
                showNotification('error', error.message);
            } finally {
                submitBtn.disabled = false;
                spinner.style.display = 'none';
                btnText.textContent = 'Submit Request';
            }
        });

        function showNotification(type, message) {
            const el = document.getElementById('notification');
            el.className = 'notification ' + type;
            el.innerHTML = message;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
